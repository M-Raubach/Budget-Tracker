<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Forgot Password</h2>

  <form id="forgotPasswordForm">
    <input type="text" id="username" placeholder="Enter Username" required>
    <input type="email" id="email" placeholder="Enter Email" required>
    <button type="submit">Recover Password</button>
  </form>

  <p id="message" class="success"></p>
  <p id="errorMessage" class="error"></p>

  <div class="links">
    <a href="usersign.html">Back to Sign In</a>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("forgotPasswordForm");
    const message = document.getElementById("message");
    const errorMessage = document.getElementById("errorMessage");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const users = JSON.parse(localStorage.getItem("users")) || [];

      message.textContent = "";
      errorMessage.textContent = "";

      const matchedUser = users.find(function (user) {
        return user.username === username && user.email === email;
      });

      if (matchedUser) {
        message.textContent =
                "Demo Mode: Password recovery simulated. In a real system, a secure reset link would be sent to your email. (For demo purposes, your password is: "
                + matchedUser.password + ")";
      } else {
        errorMessage.textContent = "No matching account found.";
      }
    });
  });
</script>

</body>
</html>
