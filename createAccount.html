<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="signin-page">

<div class="signin-container">
    <h2>Create Account</h2>

    <form id="createAccountForm">
        <input type="text" id="newUsername" placeholder="Username" required>
        <input type="email" id="newEmail" placeholder="Email" required>
        <input type="password" id="newPassword" placeholder="Password" required>
        <button type="submit">Create Account</button>
    </form>

    <p id="message" class="success"></p>
    <p id="errorMessage" class="error"></p>

    <div class="signin-links">
        <a href="usersign.html">Back to Sign In</a>
    </div>
</div>

<script>
    document.getElementById("createAccountForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const username = document.getElementById("newUsername").value.trim();
        const email = document.getElementById("newEmail").value.trim();
        const password = document.getElementById("newPassword").value.trim();

        let users = JSON.parse(localStorage.getItem("users")) || [];

        if (users.some(u => u.username === username)) {
            document.getElementById("errorMessage").textContent = "Username already exists.";
            return;
        }

        users.push({ username, email, password });
        localStorage.setItem("users", JSON.stringify(users));

        document.getElementById("message").textContent = "Account created successfully!";
        this.reset();
    });
</script>

</body>
</html>
