<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Budget</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="edit-budget-page">

    <div class="container">
        <h1>Edit Budget</h1>
        <p>Update your transaction details below.</p>

        <div class="form-section">
            <label for="type">Transaction Type</label>
            <select id="type" name="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="Enter category" />

            <label for="amount">Amount</label>
            <input type="text" id="amount" name="amount" placeholder="Enter amount" />
            <small class="note">Use numbers and decimals only. Do not use commas. Example: 3000.00</small>

            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="Enter description" />

            <label for="date">Date</label>
            <input type="date" id="date" name="date" />

            <div class="buttons">
                <button type="button" onclick="saveTransaction()">Save Transaction</button>
                <button type="button" onclick="clearForm()">Clear</button>
            </div>

            <p id="message"></p>
        </div>

        <h2>Recent Transactions</h2>
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="transactionList"></tbody>
        </table>

        <br /><br />
        <a href="budgetDataDisplay.html" class="button">Return to Budget Display</a>
    </div>

    <script>
        let transactions = [
            {
                type: "expense",
                category: "Groceries",
                amount: "75.00",
                description: "Weekly shopping",
                date: "2026-03-31"
            }
        ];

        let editIndex = -1;

        function saveTransaction() {
            const type = document.getElementById("type").value;
            const category = document.getElementById("category").value.trim();
            const amountInput = document.getElementById("amount").value.trim();
            const description = document.getElementById("description").value.trim();
            const date = document.getElementById("date").value;
            const message = document.getElementById("message");

            message.textContent = "";
            message.className = "";

            if (!category || !amountInput || !description || !date) {
                message.textContent = "Please fill in all fields.";
                message.className = "error";
                return;
            }

            const cleanedAmount = amountInput.replace(/,/g, "");

            if (isNaN(cleanedAmount)) {
                message.textContent = "Amount must be a valid number. Use decimals only, no commas.";
                message.className = "error";
                return;
            }

            const transaction = {
                type,
                category,
                amount: parseFloat(cleanedAmount).toFixed(2),
                description,
                date
            };

            if (editIndex === -1) {
                transactions.push(transaction);
                message.textContent = "Transaction saved successfully.";
                message.className = "success";
            } else {
                transactions[editIndex] = transaction;
                editIndex = -1;
                message.textContent = "Transaction updated successfully.";
                message.className = "success";
            }

            displayTransactions();
            clearForm(false);

            setTimeout(() => {
                message.textContent = "";
                message.className = "";
            }, 3000);
        }

        function displayTransactions() {
            const transactionList = document.getElementById("transactionList");
            transactionList.innerHTML = "";

            transactions.forEach((transaction, index) => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${capitalize(transaction.type)}</td>
                    <td>${transaction.category}</td>
                    <td>$${transaction.amount}</td>
                    <td>${transaction.description}</td>
                    <td>${transaction.date}</td>
                    <td class="actions-cell">
                        <button type="button" class="action-btn edit-btn" onclick="editTransaction(${index})">Edit</button>
                        <button type="button" class="action-btn delete-btn" onclick="deleteTransaction(${index})">Delete</button>
                    </td>
                `;

                transactionList.appendChild(row);
            });
        }

        function editTransaction(index) {
            const transaction = transactions[index];

            document.getElementById("type").value = transaction.type;
            document.getElementById("category").value = transaction.category;
            document.getElementById("amount").value = transaction.amount;
            document.getElementById("description").value = transaction.description;
            document.getElementById("date").value = transaction.date;

            editIndex = index;

            const message = document.getElementById("message");
            message.textContent = "Editing selected transaction.";
            message.className = "info";
        }

        function deleteTransaction(index) {
            transactions.splice(index, 1);
            displayTransactions();

            const message = document.getElementById("message");
            message.textContent = "Transaction deleted successfully.";
            message.className = "success";

            if (editIndex === index) {
                clearForm();
            }

            setTimeout(() => {
                message.textContent = "";
                message.className = "";
            }, 3000);
        }

        function clearForm(resetMessage = true) {
            document.getElementById("type").value = "income";
            document.getElementById("category").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("description").value = "";
            document.getElementById("date").value = "";
            editIndex = -1;

            if (resetMessage) {
                const message = document.getElementById("message");
                message.textContent = "";
                message.className = "";
            }
        }

        function capitalize(value) {
            return value.charAt(0).toUpperCase() + value.slice(1);
        }

        displayTransactions();
    </script>

</body>
</html>
