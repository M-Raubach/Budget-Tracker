<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Budget</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="edit-budget-page">

    <div class="container">
        <h1>Edit Budget</h1>
        <p>Update your transaction details below.</p>

        <div class="form-section">
            <label for="type">Transaction Type</label>
            <select id="type" name="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="Enter category" />

            <label for="amount">Amount</label>
            <input type="text" id="amount" name="amount" placeholder="Enter amount" />
            <small class="note">Use numbers and decimals only. Do not use commas. Example: 3000.00</small>

            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="Enter description" />

            <label for="date">Date</label>
            <input type="date" id="date" name="date" />

            <div class="buttons">
                <button type="button" onclick="handleBudgetSave()">Save Transaction</button>
                <button type="button" onclick="clearEditForm()">Clear</button>
            </div>

            <p id="message"></p>
        </div>

        <h2>Recent Transactions</h2>
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="transactionList"></tbody>
        </table>

        <br /><br />
        <a href="budgetDataDisplay.html" class="button">Return to Budget Display</a>
    </div>

    <script src="savetransaction.js"></script>

    <script>
        let editIndex = -1;

        function handleBudgetSave() {
            const type = document.getElementById("type").value;
            const category = document.getElementById("category").value.trim();
            const amountInput = document.getElementById("amount").value.trim();
            const description = document.getElementById("description").value.trim();
            const date = document.getElementById("date").value;
            const message = document.getElementById("message");

            message.textContent = "";
            message.className = "";

            if (!category || !amountInput || !description || !date) {
                message.textContent = "Please fill in all fields.";
                message.className = "error";
                return;
            }

            const cleanedAmount = amountInput.replace(/,/g, "");
            const parsedAmount = parseFloat(cleanedAmount);

            if (isNaN(parsedAmount) || parsedAmount <= 0) {
                message.textContent = "Please enter a valid amount.";
                message.className = "error";
                return;
            }

            let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

            const transaction = {
                type,
                category,
                amount: parsedAmount,
                description,
                date
            };

            if (editIndex === -1) {
                transactions.push(transaction);
                message.textContent = "Transaction saved successfully.";
                message.className = "success";
            } else {
                transactions[editIndex] = transaction;
                editIndex = -1;
                message.textContent = "Transaction updated successfully.";
                message.className = "success";
            }

            localStorage.setItem("transactions", JSON.stringify(transactions));
            renderTransactionsWithActions();
            clearEditForm(false);

            setTimeout(() => {
                message.textContent = "";
                message.className = "";
            }, 3000);
        }

        function renderTransactionsWithActions() {
            const transactionList = document.getElementById("transactionList");
            const transactions = JSON.parse(localStorage.getItem("transactions")) || [];

            transactionList.innerHTML = "";

            transactions.forEach((transaction, index) => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${capitalize(transaction.type)}</td>
                    <td>${transaction.category}</td>
                    <td>$${parseFloat(transaction.amount).toFixed(2)}</td>
                    <td>${transaction.description}</td>
                    <td>${transaction.date}</td>
                    <td class="actions-cell">
                        <button type="button" class="action-btn edit-btn" onclick="editBudgetTransaction(${index})">Edit</button>
                        <button type="button" class="action-btn delete-btn" onclick="deleteBudgetTransaction(${index})">Delete</button>
                    </td>
                `;

                transactionList.appendChild(row);
            });
        }

        function editBudgetTransaction(index) {
            const transactions = JSON.parse(localStorage.getItem("transactions")) || [];
            const transaction = transactions[index];

            document.getElementById("type").value = transaction.type;
            document.getElementById("category").value = transaction.category;
            document.getElementById("amount").value = transaction.amount;
            document.getElementById("description").value = transaction.description;
            document.getElementById("date").value = transaction.date;

            editIndex = index;

            const message = document.getElementById("message");
            message.textContent = "Editing selected transaction.";
            message.className = "info";
        }

        function deleteBudgetTransaction(index) {
            let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
            transactions.splice(index, 1);
            localStorage.setItem("transactions", JSON.stringify(transactions));

            if (editIndex === index) {
                clearEditForm(false);
            } else if (editIndex > index) {
                editIndex--;
            }

            renderTransactionsWithActions();

            const message = document.getElementById("message");
            message.textContent = "Transaction deleted successfully.";
            message.className = "success";

            setTimeout(() => {
                message.textContent = "";
                message.className = "";
            }, 3000);
        }

        function clearEditForm(resetMessage = true) {
            document.getElementById("type").value = "income";
            document.getElementById("category").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("description").value = "";
            document.getElementById("date").value = "";
            editIndex = -1;

            if (resetMessage) {
                const message = document.getElementById("message");
                message.textContent = "";
                message.className = "";
            }
        }

        function capitalize(value) {
            return value.charAt(0).toUpperCase() + value.slice(1);
        }

        window.addEventListener("load", function () {
            renderTransactionsWithActions();
        });
    </script>

</body>
</html>
