<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Username</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="signin-page">

<div class="signin-container">
    <h2>Forgot Username</h2>

    <form id="form">
        <input type="email" id="email" placeholder="Enter Email" required>
        <button type="submit">Recover Username</button>
    </form>

    <p id="message" class="success"></p>

    <div class="signin-links">
        <a href="usersign.html">Back</a>
    </div>
</div>

<script>
    document.getElementById("form").addEventListener("submit", function(e){
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const users = JSON.parse(localStorage.getItem("users")) || [];

        const user = users.find(u => u.email === email);

        if (user) {
            document.getElementById("message").textContent =
                "Demo Mode: Username would be emailed. (Your username: " + user.username + ")";
        } else {
            document.getElementById("message").textContent = "No account found.";
        }
    });
</script>

</body>
</html>
